<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CV Matcher</title>

<style>
*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f6fb;
}

.wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

h2{
text-align:center;
margin-bottom:20px;
}

input[type=file]{
width:100%;
margin-bottom:15px;
}

textarea{
width:100%;
min-height:120px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
resize:vertical;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#43a047;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

.loader{
text-align:center;
margin-top:20px;
display:none;
}

.spinner{
border:4px solid #eee;
border-top:4px solid #4CAF50;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.result{
margin-top:20px;
background:#f1f3f7;
padding:15px;
border-radius:6px;
display:none;
}

.score{
font-size:22px;
font-weight:bold;
color:#4CAF50;
margin-bottom:10px;
}

pre{
white-space:pre-wrap;
word-wrap:break-word;
}

@media(max-width:480px){
.container{
padding:18px;
}

h2{
font-size:20px;
}

button{
font-size:15px;
}

.score{
font-size:20px;
}
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<h2>AI CV Matcher</h2>

<input type="file" id="cvFile">

<textarea id="jobDesc" placeholder="Paste Job Description"></textarea>

<button id="matchBtn" onclick="uploadCV()">Match CV</button>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Analyzing CV...</p>
</div>

<div class="result" id="result"></div>

</div>
</div>

<script>

async function uploadCV(){

const file=document.getElementById("cvFile").files[0];
const jobDesc=document.getElementById("jobDesc").value;
const loader=document.getElementById("loader");
const resultDiv=document.getElementById("result");
const button=document.getElementById("matchBtn");

if(!file){
alert("Please upload CV");
return;
}

const formData=new FormData();
formData.append("file",file);
formData.append("job_description",jobDesc);

loader.style.display="block";
resultDiv.style.display="none";
button.disabled=true;

try{

const response=await fetch("https://ai-cv-matcher-3r09.onrender.com/match-cv",{
method:"POST",
body:formData
});

if(!response.ok){
const text=await response.text();
throw new Error(text);
}

const data=await response.json();

loader.style.display="none";
button.disabled=false;

if(data.error){
alert("Server error: "+JSON.stringify(data.details));
return;
}

const analysis=data.analysis || "No analysis returned";

const scoreMatch=analysis.match(/\d+/);
const score=scoreMatch?scoreMatch[0]:"N/A";

resultDiv.style.display="block";
resultDiv.innerHTML=`
<div class="score">Match Score: ${score}%</div>
<pre>${analysis}</pre>
`;

}catch(err){

loader.style.display="none";
button.disabled=false;

alert("Error connecting to API: "+err.message);

}

}

</script>

</body>
</html>
