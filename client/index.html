<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurix AI CV Matcher</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4f46e5,#9333ea);
}

/* card */

.container{
width:100%;
max-width:520px;
background:rgba(255,255,255,0.95);
padding:35px;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:10px;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:25px;
}

/* drag drop */

.dropzone{
border:2px dashed #6366f1;
border-radius:12px;
padding:35px;
cursor:pointer;
transition:0.3s;
margin-bottom:10px;
background:#f9fafb;
}

.dropzone:hover{
background:#eef2ff;
}

.dropzone input{
display:none;
}

#fileStatus{
font-size:14px;
margin-bottom:15px;
color:#444;
}

/* textarea */

textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
min-height:120px;
resize:vertical;
}

/* button */

button{
margin-top:18px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#4338ca;
}

/* loader */

.loader{
display:none;
margin-top:20px;
}

.spinner{
width:40px;
height:40px;
border:4px solid #eee;
border-top:4px solid #4f46e5;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* result */

.result{
margin-top:25px;
display:none;
text-align:left;
background:#f3f4f6;
padding:15px;
border-radius:8px;
}

.score{
font-size:22px;
font-weight:bold;
color:#4f46e5;
margin-bottom:10px;
}

pre{
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<h1>Neurix AI</h1>
<div class="subtitle">Upload your CV and match it with a job description</div>

<label class="dropzone">
📄 Drag & Drop your CV or Click to Upload
<input type="file" id="cvFile" onchange="showFileName()">
</label>

<div id="fileStatus"></div>

<textarea id="jobDesc" placeholder="Paste job description..."></textarea>

<button onclick="uploadCV()">Analyze CV</button>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Analyzing CV...</p>
</div>

<div class="result" id="result"></div>

</div>

<script>

/* show uploaded file name */

function showFileName(){

const file=document.getElementById("cvFile").files[0];

if(file){

const size=(file.size/1024/1024).toFixed(2);

document.getElementById("fileStatus").innerHTML=
"✅ "+file.name+" ("+size+" MB)";

document.querySelector(".dropzone").style.borderColor="#10b981";
document.querySelector(".dropzone").style.background="#ecfdf5";

}

}

/* main function */

async function uploadCV(){

const file=document.getElementById("cvFile").files[0];
const jobDesc=document.getElementById("jobDesc").value;

if(!file){
alert("Please upload CV first");
return;
}

const loader=document.getElementById("loader");
const result=document.getElementById("result");

loader.style.display="block";
result.style.display="none";

const formData=new FormData();
formData.append("file",file);
formData.append("job_description",jobDesc);

try{

const response=await fetch("https://ai-cv-matcher-3r09.onrender.com/match-cv",{
method:"POST",
body:formData
});

const data=await response.json();

loader.style.display="none";

const analysis=data.analysis || "";

const scoreMatch=analysis.match(/\d+/);
const score=scoreMatch?scoreMatch[0]:"N/A";

result.style.display="block";
result.innerHTML=`
<div class="score">Match Score: ${score}%</div>
<pre>${analysis}</pre>
`;

}catch(err){

loader.style.display="none";
alert("Error connecting to API");

}

}

</script>

</body>
</html>
